<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — ClipRelay</title>
  <meta name="description" content="This ClipRelay page does not exist. Return to the homepage.">
  <meta name="theme-color" content="#111820">
  <meta name="robots" content="noindex">

  <link rel="canonical" href="https://cliprelay.org/404.html">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">

  <style>
    .not-found {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 20px 60px;
      position: relative;
      overflow: hidden;
    }
    .not-found::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 30%, rgba(0, 255, 213, 0.1), transparent 35%),
        radial-gradient(circle at 70% 60%, rgba(0, 255, 213, 0.06), transparent 40%);
      pointer-events: none;
    }
    .not-found-panel {
      width: min(720px, 100%);
      padding: 48px 32px;
      border: 1px solid rgba(0, 255, 213, 0.14);
      border-radius: 24px;
      background: rgba(24, 32, 40, 0.92);
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.45),
        0 0 40px rgba(0, 255, 213, 0.04);
      position: relative;
      z-index: 1;
      text-align: center;
    }
    .not-found-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      color: var(--aqua);
      background: rgba(0, 255, 213, 0.08);
      border: 1px solid rgba(0, 255, 213, 0.14);
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 24px;
    }
    .not-found h1 {
      font-family: var(--font-display);
      font-size: clamp(2.25rem, 5.5vw, 3.75rem);
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1.12;
      padding: 0.2em 0 0.35em;
      background: var(--gradient-title);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 24px;
    }
    .not-found p {
      max-width: 540px;
      margin: 0 auto 28px;
      color: var(--text-dim);
      font-size: 1.05rem;
    }
    .not-found-path {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: var(--text);
      word-break: break-word;
    }
    .not-found-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }
    @media (max-width: 640px) {
      .not-found-panel {
        padding: 40px 24px;
      }
      .not-found-actions {
        flex-direction: column;
        align-items: stretch;
      }
      .not-found-actions .btn {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <nav class="nav scrolled">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <svg width="28" height="28" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="navBoardGrad" x1="0" y1="0" x2="0.3" y2="1"><stop stop-color="#0A3A34"/><stop offset="1" stop-color="#082A26"/></linearGradient>
            <linearGradient id="navArcGrad" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#00FFD5"/><stop offset="1" stop-color="#00DDC0"/></linearGradient>
          </defs>
          <rect x="14" y="26" width="58" height="78" rx="12" fill="url(#navBoardGrad)" stroke="#00FFD5" stroke-width="1.5" opacity="0.9"/>
          <rect x="24" y="18" width="38" height="14" rx="5" fill="#082A26" stroke="#00FFD5" stroke-width="1.2"/>
          <rect x="30" y="14" width="26" height="8" rx="4" fill="#0A3A34" stroke="#00DDC0" stroke-width="1"/>
          <rect x="39" y="22" width="8" height="3" rx="1.5" fill="#00FFD5" opacity="0.55"/>
          <rect x="24" y="42" width="38" height="4.5" rx="2.25" fill="#00FFD5" opacity="0.35"/>
          <rect x="24" y="51" width="27" height="4.5" rx="2.25" fill="#00FFD5" opacity="0.22"/>
          <rect x="24" y="60" width="33" height="4.5" rx="2.25" fill="#00FFD5" opacity="0.22"/>
          <rect x="24" y="69" width="20" height="4.5" rx="2.25" fill="#00FFD5" opacity="0.15"/>
          <path d="M80 48 A 20 20 0 0 1 80 78" stroke="url(#navArcGrad)" stroke-width="4" stroke-linecap="round" fill="none"/>
          <path d="M90 39 A 32 32 0 0 1 90 87" stroke="url(#navArcGrad)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
          <path d="M100 30 A 44 44 0 0 1 100 96" stroke="url(#navArcGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
        </svg>
        ClipRelay
      </a>
    </div>
  </nav>

  <main class="not-found">
    <section class="not-found-panel">
      <div class="not-found-kicker">404 • Page not found</div>
      <h1>Wrong route.<br>Right product.</h1>
      <p>The page at <span class="not-found-path" id="missing-path"></span> does not exist. Head back to the homepage.</p>
      <div class="not-found-actions">
        <a href="/" class="btn btn-primary">Go to homepage</a>
      </div>
    </section>
  </main>

  <script>
    const path = window.location.pathname || '/';
    document.getElementById('missing-path').textContent = path;
  </script>
</body>
</html>
