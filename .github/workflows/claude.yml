name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        (github.event.review.author_association == 'OWNER' ||
         github.event.review.author_association == 'MEMBER' ||
         github.event.review.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          branch_prefix: "claude/"
          claude_args: "--dangerously-skip-permissions --model claude-opus-4-6"

          # For label-triggered issues, tell Claude what to do.
          # For @claude comments, the comment itself is the instruction.
          prompt: >-
            ${{ github.event_name == 'issues' && '
            Analyze this GitHub issue. Before implementing anything:

            1. Read the issue carefully and examine the relevant code.

            2. If the issue is ambiguous, underspecified, or you are unsure about
               the right approach, comment on the issue with your questions and
               proposed plan. Then stop and wait for feedback.

            3. If the issue is clear and straightforward, proceed to implement
               the fix. Create a pull request with your changes, following the
               coding standards in CLAUDE.md and AGENTS.md.

            4. In the PR description, explain what you changed and why.
               Link back to the issue.
            ' || '' }}

          # Allow Claude to read CI results on PRs
          additional_permissions: |
            actions: read

